name: Trigger Site Deploys

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  trigger-deploy-hooks:
    runs-on: ubuntu-latest
    steps:
      - name: Validate hook configuration
        env:
          NETLIFY_BUILD_HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}
          CLOUDFLARE_DEPLOY_HOOK: ${{ secrets.CLOUDFLARE_DEPLOY_HOOK }}
        run: |
          if [ -z "$NETLIFY_BUILD_HOOK" ]; then
            echo "NETLIFY_BUILD_HOOK is not set"
            exit 1
          fi

          if [ -z "$CLOUDFLARE_DEPLOY_HOOK" ]; then
            echo "CLOUDFLARE_DEPLOY_HOOK is not set"
            exit 1
          fi

      - name: Trigger Netlify build hook
        env:
          NETLIFY_BUILD_HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}
        run: curl -X POST -d '{}' "$NETLIFY_BUILD_HOOK"

      - name: Trigger Cloudflare Pages deploy hook
        env:
          CLOUDFLARE_DEPLOY_HOOK: ${{ secrets.CLOUDFLARE_DEPLOY_HOOK }}
        run: curl -X POST "$CLOUDFLARE_DEPLOY_HOOK"
